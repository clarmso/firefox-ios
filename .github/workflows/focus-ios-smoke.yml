name: "Focus Tests"
    
on:
    workflow_dispatch:

env:
    xcode_version: 15.4
    ios_version: 17.4
    ios_simulator: iPhone 15
    test_plan: SmokeTest
    
jobs:
    run-tests:
        name: Compile source code and run tests
        runs-on: macos-14
        steps:
            - name: Check out source code
              uses: actions/checkout@v4
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
            - name: Install Python packages required
              run: |
                brew update
                pip3 install virtualenv pipenv
            - name: Setup Xcode
              run: |
                sudo rm -rf /Applications/Xcode.app
                sudo xcode-select -s /Applications/Xcode_${{ env.xcode_version }}.app/Contents/Developer
                xcodebuild -version
                xcrun simctl shutdown all
                xcrun simctl erase all
                ./checkout.sh
            - name: Compile!
              run: |
                xcodebuild -resolvePackageDependencies -onlyUsePackageVersionsFromResolvedFile
                # xcodebuild build-for-testing -scheme Focus -target XCUITest -configuration FocusDebug -destination 'platform=iOS Simulator,name=${{ env.ios_simulator }},OS=${{ env.ios_version }}'
              working-directory: focus-ios
            - name: Run ${{ env.test_plan }}
              run: |
                # xcodebuild test-without-building -scheme Focus -target XCUITest -configuration FocusDebug -destination 'platform=iOS Simulator,name=${{ env.ios_simulator }},OS=${{ env.ios_version }}' -testPlan ${{ env.test_plan }} -only-testing:XCUITest/CopyPasteTest
                echo "hello world!!" > result.txt
              working-directory: focus-ios
              continue-on-error: true
            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v1.1.1
              with:
                credentials_json: ${{ secrets.GCP_SA_KEY }}
            - name: Upload to Google Cloud bucket
              uses: google-github-actions/upload-cloud-storage@v2
              with:
               path: 'focus-ios/result.txt'
               destination: 'mobile-reports/public/focus-ios/smoke/result_${{ github.run_number }}'
            - name: Report to Slack
              id: slack
              uses: slackapi/slack-github-action@v1.26.0
              with:
                # This data can be any valid JSON from a previous step in the GitHub Action
                payload: |
                  {
                    "xcode_version": "${{ env.xcode_version }}",
                    "ios_simulator": "${{ env.ios_simulator }}",
                    "ios_version": "${{ env.ios_version }}",
                    "test_plan": "${{ env.test_plan }}",
                    "test_report_url": 'mobile-reports/public/focus-ios/smoke/result_${{ github.run_number }}'
                  }
              env:
                SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}