name: "Test webhooks"
    
on:
    workflow_dispatch:

jobs:
    call-webhooks:
        runs-on: macos-14
        steps:
            - name: Report to Slack
              id: slack
              uses: slackapi/slack-github-action@v1.26.0
              with:
                  payload: |
                    {
                        "blocks": [
                            {
			                    "type": "section",
			                    "text": {
				                    "type": "plain_text",
				                    "text": "Hello World!",
				                    "emoji": true
			                    }
		                    }
                        ]
                    }          
              env:
                SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TEST_INFRA_ALERTS_WEBHOOK }}