name: "Test webhooks"
    
on:
    workflow_dispatch:

env:
    browser: focus-ios
    xcode_version: 15.4
    ios_version: 17.5
    ios_simulator: iPhone 15
    xcodebuild_test_plan: SmokeTest
    xcodebuild_scheme: Focus
    xcodebuild_target: XCUITest
    test_results_directory: /Users/runner/tmp

jobs:
    call-webhooks:
        runs-on: macos-14
        steps:
            - name: Hello World!
              run: |
                echo "Hello World!"
                export ios_version="17.4"
                export ios_simulator="iPhone 15"
                echo $ios_version
                echo $ios_simulator
            - name: Report to Slack
              id: slack
              uses: slackapi/slack-github-action@v1.26.0
              with:
                payload: |
                  {
                    "blocks":[
                      {
                        "type": "header",
                        "text": {
                          "type": "plain_text",
                          "text": "hello ${{ env.browser }} :firefox: ${{ env.xcodebuild_test_plan }} - ${{ env.ios_simulator }} iOS ${{ env.ios_version }}",
                          "emoji": true
                        }
                      },
                      {
                        "type":"divider"
                      },
                        {
                        "type": "section",
                        "text": {
                          "type": "mrkdwn",
                          "text": "*Branch*: `${{ github.ref_name }}`"
                        }
                      },
                      {
                        "type": "section",
                        "text": {
                          "text": "A message *with some bold text* and _some italicized text_.",
                          "type": "mrkdwn"
                        },
                        "fields": [
                          {
                            "type": "mrkdwn",
                            "text": "High"
                          },
                          {
                            "type": "plain_text",
                            "emoji": true,
                            "text": "Silly"
                          }
                        ]
                      }
                    ]
                  }
              env:
                SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
                SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK