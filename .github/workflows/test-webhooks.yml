name: "Test webhooks"
    
on:
    workflow_dispatch:

env:
    browser: focus-ios
    xcode_version: 15.4
    ios_version: 17.5
    xcodebuild_test_plan: SmokeTest
    xcodebuild_scheme: Focus
    xcodebuild_target: XCUITest
    test_results_directory: /Users/runner/tmp

jobs:
    call-webhooks:
        runs-on: macos-14
        strategy:
          matrix:
              ios_simulator: ['iPhone 15', 'iPad Pro (12.9-inch) (6th generation)']
        steps:
            - name: Check out source code
              uses: actions/checkout@v4.1.7
            - name: Hello World!
              run: |
                echo "Hello World!"
            - name: Report to Slack
              id: slack
              uses: slackapi/slack-github-action@v1.26.0
              with:
                payload-file-path: "./test-fixtures/ci/slack-notification-xcuitest.json"
              env:
                SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
                SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
                pass_fail: "{{ }}"
                ref_name: "main"
                run_number: "111111111111"
                ios_simulator: ${{ matrix.ios_simulator }}
                server_url: "https://github.com/"
                repository: "https://github.com/clarmso/firefox-ios/"