name: "Test webhooks"
    
on:
    workflow_dispatch:

jobs:
    call-webhooks:
        runs-on: macos-14
        steps:
            - name: Hello World!
              run: |
                echo "Hello World!"
                jq -n --arg type 'divider' '$ARGS.named' | \
                  jq -n '.items|=[inputs]'
                # jq -n --arg blocks '[]' '$ARGS.named' > slack.json
            - name: Report to Slack
              id: slack
              uses: slackapi/slack-github-action@v1.26.0
              with:
                payload-file-path: "./slack.json"
              env:
                SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TEST_INFRA_ALERTS_WEBHOOK }}
                SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK