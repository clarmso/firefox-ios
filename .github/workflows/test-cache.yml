name: "Test caching"
    
on:
    workflow_dispatch:

env:
    browser: focus-ios
    xcode_version: 15.4
    ios_version: 17.5
    ios_simulator: iPhone 15
    xcodebuild_test_plan: SmokeTest
    xcodebuild_scheme: Focus
    xcodebuild_target: XCUITest
    test_results_directory: /Users/runner/tmp

jobs:
    just-compile:
        runs-on: macos-14
        steps:
            - name: Check out source code
              uses: actions/checkout@v4.1.7
            - name: Hello World!
              run: |
                echo "Hello World!"
            - name: Setup Python
              uses: actions/setup-python@v5.1.0
              with:
                python-version: '3.11'
            - name: Install packages
              id: packages
              run: |
                brew update
                pip3 install virtualenv pipenv
            - name: Setup Xcode
              id: xcode
              run: |
                sudo rm -rf /Applications/Xcode.app
                sudo xcode-select -s /Applications/Xcode_${{ env.xcode_version }}.app/Contents/Developer
                xcodebuild -version
                ./checkout.sh
                ./bootstrap.sh --force
            - name: Compile source code
              id: compile
              run: |
                xcodebuild \
                    -resolvePackageDependencies \
                    -onlyUsePackageVersionsFromResolvedFile
                xcodebuild \
                    build-for-testing \
                    -scheme ${{ env.xcodebuild_scheme }} \
                    -target ${{ env.xcodebuild_target }} \
                    -derivedDataPath ~/DerivedData \
                    -destination 'platform=iOS Simulator,name=${{ env.ios_simulator }},OS=${{ env.ios_version }}'
              working-directory: ${{ env.browser }}
            - name: What's in derived data?
              run: |
                ls ~/DerivedData/
                ls ~/DerivedData/Build/Products
            - name: Compress Derived Data
              id: derived-data
              uses: actions/upload-artifact@v4.3.3
              with:
                name: xcode-cache-deriveddata-${{ github.workflow }}-${{ github.sha }}
                path: ~/DerivedData/Build/Products
                retention-days: 1
    run-something:
      runs-on: macos-14
      needs: just-compile
      steps: 
        - name: Check out source code
          uses: actions/checkout@v4.1.7
        - name: Setup Python
          uses: actions/setup-python@v5.1.0
          with:
            python-version: '3.11'
        - name: Install packages
          id: packages
          run: |
            brew update
            pip3 install virtualenv pipenv
        - name: Setup Xcode
          id: xcode
          run: |
            sudo rm -rf /Applications/Xcode.app
            sudo xcode-select -s /Applications/Xcode_${{ env.xcode_version }}.app/Contents/Developer
            xcodebuild -version
            ./checkout.sh
            ./bootstrap.sh --force  
        - name: Get derived data
          uses: actions/download-artifact@v4
          with:
            name: xcode-cache-deriveddata-${{ github.workflow }}-${{ github.sha }}
            path: ~/DerivedData/Build/Products
        - name: Run a single test!
          run: |
            xcodebuild \
              test-without-building \
              -scheme ${{ env.xcodebuild_scheme }} \
              -target ${{ env.xcodebuild_target }} \
              -destination 'platform=iOS Simulator,name=${{ env.ios_simulator }},OS=${{ env.ios_version }}' \
              -testPlan ${{ env.xcodebuild_test_plan }} \
              -only-testing:XCUITest/BrowsingTest 
              -derivedDataPath ~/DerivedData \
              -resultBundlePath ${{ env.test_results_directory }}/results
          working-directory:  ${{ env.browser }}
          continue-on-error: true